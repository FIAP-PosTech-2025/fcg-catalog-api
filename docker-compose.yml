services:
  tccatalog-api:
    build:
      context: .
      dockerfile: TcCatalog.Api/Dockerfile
    image: tccatalog-img
    container_name: tccatalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: Server=host.docker.internal,1433;Database=TcCatalogDb;User Id=sa;Password=Jl130916;Encrypt=False;TrustServerCertificate=True;
      RabbitMq__HostName: host.docker.internal
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__OrderPlacedQueue: OrderPlaced
      RabbitMq__PaymentProcessedExchange: PaymentProcessed
      RabbitMq__PaymentProcessedQueue: PaymentProcessed.Catalog
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5001"
